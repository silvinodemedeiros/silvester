
      <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="styles.css">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
      <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
      <title>Dashboard X</title>
    </head>
    <body>
      
      <div class="layout layout-preview">
        <main class="content content-preview">

          <div class="grid grid-structure grid-preview">

            <div class="grid-structure grid-widgets-wrapper grid-widgets-wrapper-preview">
      
          <div
            class="grid-widget grid-widget-has-preview grid-widget-rain cell monochromatic"
            style="grid-area: 5 / 9 / span 4 / span 4;"
            tabIndex="0"
          >

            <h1 class="grid-widget-title">
              Rain
            </h1>

            
            <div class="grid-widget-value">
              0.1
              <span class="grid-widget-value-suffix">
                mm/h
              </span>
            </div>
    

            <div class="grid-widget-icon">
              <i class="bi bi-cloud-rain"></i>
            </div>
          </div>
    
               </div>
          </div>
        </main>
      </div>
      
      <div id="dark-mode-toggle" class="accessibility" tabIndex="0" role="button">
        <i class="bi bi-moon-stars"></i>
      </div>
    </body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="script.js" type="text/javascript" language="javascript"></script>

  </html>
