
      <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="styles.css">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
      <title>Dashboard X</title>
    </head>
    <body>
      
      <div class="layout layout-preview">
        <main class="content content-preview">

          <div class="grid grid-preview">

            <div class="grid-widgets-wrapper">
      
      <div
        class="grid-widget grid-widget-sunset cell monochromatic"
        style="grid-area: 7 / 11 / span 4 / span 4;"
        tabIndex="1"
      >

        <p class="grid-widget-title">
          Sunset
        </p>

        <span class="grid-widget-value">
          17:39
          <span class="grid-widget-value-suffix">
            
          </span>
        </span>

        <p class="grid-widget-icon">
          <i class="bi bi-sunset"></i>
        </p>
      </div>
    
      <div
        class="grid-widget grid-widget-sunrise cell monochromatic"
        style="grid-area: 7 / 7 / span 4 / span 4;"
        tabIndex="1"
      >

        <p class="grid-widget-title">
          Sunrise
        </p>

        <span class="grid-widget-value">
          05:26
          <span class="grid-widget-value-suffix">
            
          </span>
        </span>

        <p class="grid-widget-icon">
          <i class="bi bi-sunrise"></i>
        </p>
      </div>
    
      <div
        class="grid-widget grid-widget-temp cell monochromatic"
        style="grid-area: 7 / 15 / span 4 / span 4;"
        tabIndex="1"
      >

        <p class="grid-widget-title">
          Temperature
        </p>

        <span class="grid-widget-value">
          29.02
          <span class="grid-widget-value-suffix">
            °C
          </span>
        </span>

        <p class="grid-widget-icon">
          <i class="bi bi-thermometer-half"></i>
        </p>
      </div>
    
      <div
        class="grid-widget grid-widget-feels_like cell monochromatic"
        style="grid-area: 3 / 11 / span 4 / span 4;"
        tabIndex="1"
      >

        <p class="grid-widget-title">
          Feels Like
        </p>

        <span class="grid-widget-value">
          33.54
          <span class="grid-widget-value-suffix">
            °C
          </span>
        </span>

        <p class="grid-widget-icon">
          <i class="bi bi-droplet"></i>
        </p>
      </div>
    
      <div
        class="grid-widget grid-widget-dew_point cell monochromatic"
        style="grid-area: 3 / 7 / span 4 / span 4;"
        tabIndex="1"
      >

        <p class="grid-widget-title">
          Dew Point
        </p>

        <span class="grid-widget-value">
          23.91
          <span class="grid-widget-value-suffix">
            °C
          </span>
        </span>

        <p class="grid-widget-icon">
          <i class="bi bi-droplet-half"></i>
        </p>
      </div>
    
      <div
        class="grid-widget grid-widget-clouds cell monochromatic"
        style="grid-area: 3 / 15 / span 4 / span 4;"
        tabIndex="1"
      >

        <p class="grid-widget-title">
          Clouds
        </p>

        <span class="grid-widget-value">
          33
          <span class="grid-widget-value-suffix">
            %
          </span>
        </span>

        <p class="grid-widget-icon">
          <i class="bi bi-clouds"></i>
        </p>
      </div>
    
               </div>
          </div>
        </main>
      </div>
      
      <div id="dark-mode-toggle" class="accessibility" tabIndex="1">
        <i class="bi bi-moon-stars"></i>
      </div>
    </body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  
    <script src="script.js" type="text/javascript" language="javascript"></script>

  </html>
