
      <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="styles.css">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
      <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
      <title>Dashboard X</title>
    </head>
    <body>
      
      <div class="layout layout-preview">
        <main class="content content-preview">

          <div class="grid grid-structure grid-preview">

            <div class="grid-structure grid-widgets-wrapper grid-widgets-wrapper-preview">
      
          <div
            class="grid-widget grid-widget-has-preview grid-widget-location cell monochromatic"
            style="grid-area: 3 / 3 / span 8 / span 8;"
            tabIndex="0"
          >

            <h1 class="grid-widget-title">
              Location
            </h1>

            
            <div
              inert
              class="grid-widget-map"
              style="width: 300px; height: 200px;"
              data-lat="-5.837006"
              data-lng="-35.203026"
            ></div>
      

            <div class="grid-widget-icon">
              <i class="bi bi-geo"></i>
            </div>
          </div>
    
          <div
            class="grid-widget grid-widget-has-preview grid-widget-clouds cell monochromatic"
            style="grid-area: 3 / 11 / span 4 / span 4;"
            tabIndex="0"
          >

            <h1 class="grid-widget-title">
              Clouds
            </h1>

            
            <div class="grid-widget-value">
              100
              <span class="grid-widget-value-suffix">
                %
              </span>
            </div>
    

            <div class="grid-widget-icon">
              <i class="bi bi-clouds"></i>
            </div>
          </div>
    
          <div
            class="grid-widget grid-widget-has-preview grid-widget-feels_like cell monochromatic"
            style="grid-area: 7 / 11 / span 4 / span 4;"
            tabIndex="0"
          >

            <h1 class="grid-widget-title">
              Feels Like
            </h1>

            
            <div class="grid-widget-value">
              38.68
              <span class="grid-widget-value-suffix">
                °C
              </span>
            </div>
    

            <div class="grid-widget-icon">
              <i class="bi bi-emoji-sunglasses"></i>
            </div>
          </div>
    
          <div
            class="grid-widget grid-widget-has-preview grid-widget-temp cell monochromatic"
            style="grid-area: 3 / 15 / span 4 / span 4;"
            tabIndex="0"
          >

            <h1 class="grid-widget-title">
              Temperature
            </h1>

            
            <div class="grid-widget-value">
              31.68
              <span class="grid-widget-value-suffix">
                °C
              </span>
            </div>
    

            <div class="grid-widget-icon">
              <i class="bi bi-thermometer-half"></i>
            </div>
          </div>
    
          <div
            class="grid-widget grid-widget-has-preview grid-widget-dew_point cell monochromatic"
            style="grid-area: 7 / 15 / span 4 / span 4;"
            tabIndex="0"
          >

            <h1 class="grid-widget-title">
              Dew Point
            </h1>

            
            <div class="grid-widget-value">
              28.64
              <span class="grid-widget-value-suffix">
                °C
              </span>
            </div>
    

            <div class="grid-widget-icon">
              <i class="bi bi-droplet-half"></i>
            </div>
          </div>
    
          <div
            class="grid-widget grid-widget-has-preview grid-widget-humidity cell monochromatic"
            style="grid-area: 3 / 19 / span 4 / span 4;"
            tabIndex="0"
          >

            <h1 class="grid-widget-title">
              Humidity
            </h1>

            
            <div class="grid-widget-value">
              84
              <span class="grid-widget-value-suffix">
                %
              </span>
            </div>
    

            <div class="grid-widget-icon">
              <i class="bi bi-droplet"></i>
            </div>
          </div>
    
          <div
            class="grid-widget grid-widget-has-preview grid-widget-dew_point cell monochromatic"
            style="grid-area: 7 / 19 / span 4 / span 4;"
            tabIndex="0"
          >

            <h1 class="grid-widget-title">
              Dew Point
            </h1>

            
            <div class="grid-widget-value">
              28.64
              <span class="grid-widget-value-suffix">
                °C
              </span>
            </div>
    

            <div class="grid-widget-icon">
              <i class="bi bi-droplet-half"></i>
            </div>
          </div>
    
               </div>
          </div>
        </main>
      </div>
      
      <div id="dark-mode-toggle" class="accessibility" tabIndex="0" role="button">
        <i class="bi bi-moon-stars"></i>
      </div>
    </body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src='https://unpkg.com/wicg-inert@latest/dist/inert.min.js'></script>

    <script src="script.js" type="text/javascript" language="javascript"></script>

  </html>
